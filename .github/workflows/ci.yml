name: CI

on:
  push:
  pull_request:

jobs:
  build-test:
    name: Build And Test (GCC)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: ctest --test-dir build --output-on-failure

  asan:
    name: Build And Test (Clang ASan/UBSan)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Clang
        run: |
          sudo apt-get update
          sudo apt-get install -y clang

      - name: Configure
        env:
          CC: clang
          CXX: clang++
        run: cmake -S . -B build-asan -DCMAKE_BUILD_TYPE=Debug -DPP_ENABLE_SANITIZERS=ON

      - name: Build
        run: cmake --build build-asan --parallel

      - name: Test
        run: ctest --test-dir build-asan --output-on-failure

  lint:
    name: Lint (cppcheck)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install cppcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y cppcheck

      - name: Run cppcheck
        run: |
          cppcheck \
            --std=c99 \
            --language=c \
            -Iinclude \
            -Isrc \
            --enable=warning,style,performance,portability \
            --inconclusive \
            --error-exitcode=1 \
            --suppress=missingInclude \
            --suppress=missingIncludeSystem \
            --suppress=unusedFunction \
            --force \
            include src tests
